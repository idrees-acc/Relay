<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Relay</title>
  <link rel="icon" type="image/png" href="/hussain.png">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&display=swap">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: "Montserrat", Arial, sans-serif;
      background: #f2f3eb;
      min-height: 100vh;
    }

    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0.75rem 2rem;
      background: linear-gradient(
        90deg,
        rgba(238, 174, 202, 1) 0%,
        rgba(154, 186, 231, 1) 93%,
        rgba(148, 187, 233, 1) 100%
      );
      border-bottom: solid 2px #474544;
    }

    .header-left {
      display: flex;
      align-items: center;
      gap: 0.75rem;
    }

    .header-logo {
      width: 40px;
      height: auto;
    }

    header h1 {
      font-size: 1.1rem;
      color: #474544;
      letter-spacing: 5px;
      text-transform: uppercase;
      font-weight: 700;
    }

    .logout-btn {
      background: none;
      border: solid 2px #474544;
      color: #474544;
      cursor: pointer;
      font-family: "Montserrat", Arial, sans-serif;
      font-size: 0.8rem;
      font-weight: bold;
      padding: 8px 20px;
      text-transform: uppercase;
      transition: all 0.3s;
    }

    .logout-btn:hover {
      background: #474544;
      color: #f2f3eb;
    }

    main {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem 1rem;
      min-height: calc(100vh - 65px);
    }

    .video-container {
      position: relative;
      width: 100%;
      max-width: 800px;
      aspect-ratio: 16 / 9;
      background: #000;
      border-radius: 8px;
      overflow: hidden;
      user-select: none;
      -webkit-user-select: none;
      border: solid 2px #474544;
    }

    .video-container iframe {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      border: none;
    }

    .video-overlay {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 10;
      cursor: pointer;
    }

    .video-overlay.hidden {
      display: none;
    }

    @media screen and (max-width: 480px) {
      header {
        padding: 0.5rem 1rem;
      }

      header h1 {
        font-size: 0.9rem;
        letter-spacing: 3px;
      }

      .header-logo {
        width: 30px;
      }

      .logout-btn {
        padding: 6px 14px;
        font-size: 0.75rem;
      }
    }
  </style>
</head>
<body>
  <header>
    <div class="header-left">
      <img src="/hussain.png" alt="Relay" class="header-logo">
      <h1>Relay</h1>
    </div>
    <form method="POST" action="/logout">
      <button type="submit" class="logout-btn">Log out</button>
    </form>
  </header>
  <main>
    <div class="video-container">
      <iframe
        src="https://www.youtube-nocookie.com/embed/{{YOUTUBE_VIDEO_ID}}"
        allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"
        allowfullscreen
      ></iframe>
      <div class="video-overlay" id="overlay"></div>
    </div>
  </main>
  <script>
    var overlay = document.getElementById('overlay');
    overlay.addEventListener('click', function () {
      overlay.classList.add('hidden');
    });
    document.querySelector('.video-container').addEventListener('mouseleave', function () {
      overlay.classList.remove('hidden');
    });
    overlay.addEventListener('contextmenu', function (e) {
      e.preventDefault();
    });
  </script>
</body>
</html>
