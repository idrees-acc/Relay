<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ashara 1448 Relay</title>
  <link rel="icon" type="image/png" href="/hussain.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap">
  <style>
    :root {
      --bg: #000;
      --header-bg: rgba(0, 0, 0, 0.7);
      --text: #fafafa;
      --text-muted: #a1a1aa;
      --border: rgba(255, 255, 255, 0.1);
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      height: 100%;
      overflow: hidden;
    }

    body {
      font-family: "Inter", -apple-system, BlinkMacSystemFont, sans-serif;
      background: var(--bg);
      color: var(--text);
      -webkit-font-smoothing: antialiased;
    }

    header {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      z-index: 100;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 1.25rem;
      height: 48px;
      background: var(--header-bg);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border);
    }

    .header-left {
      display: flex;
      align-items: center;
      gap: 0.625rem;
    }

    .header-logo {
      width: 28px;
      height: auto;
      opacity: 0.9;
    }

    header h1 {
      font-size: 0.8125rem;
      font-weight: 600;
      letter-spacing: 0.02em;
      color: var(--text-muted);
    }

    .logout-btn {
      background: none;
      border: 1px solid var(--border);
      color: var(--text-muted);
      cursor: pointer;
      font-family: inherit;
      font-size: 0.75rem;
      font-weight: 500;
      padding: 0.375rem 0.875rem;
      border-radius: 6px;
      transition: all 0.15s;
    }

    .logout-btn:hover {
      background: rgba(255, 255, 255, 0.08);
      color: var(--text);
      border-color: rgba(255, 255, 255, 0.2);
    }

    .video-wrap {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      user-select: none;
      -webkit-user-select: none;
    }

    .video-wrap iframe {
      width: 100%;
      height: 100%;
      border: none;
    }

    .video-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 50;
      cursor: pointer;
    }

    .video-overlay.hidden {
      display: none;
    }
  </style>
</head>
<body>
  <div class="video-wrap">
    <iframe
      src="https://www.youtube-nocookie.com/embed/{{YOUTUBE_VIDEO_ID}}?rel=0&modestbranding=1"
      allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"
      allowfullscreen
    ></iframe>
    <div class="video-overlay" id="overlay"></div>
  </div>
  <header>
    <div class="header-left">
      <img src="/hussain.png" alt="" class="header-logo">
      <h1>Ashara 1448 Relay</h1>
    </div>
    <form method="POST" action="/logout">
      <button type="submit" class="logout-btn">Log out</button>
    </form>
  </header>
  <script>
    var overlay = document.getElementById('overlay');
    overlay.addEventListener('click', function () {
      overlay.classList.add('hidden');
    });
    document.querySelector('.video-wrap').addEventListener('mouseleave', function () {
      overlay.classList.remove('hidden');
    });
    overlay.addEventListener('contextmenu', function (e) {
      e.preventDefault();
    });
  </script>
</body>
</html>
