<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ashara 1448 Relay</title>
  <link rel="icon" type="image/png" href="/hussain.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap">
  <style>
    :root {
      --bg: #0a0a0a;
      --surface: #141414;
      --border: #262626;
      --text: #fafafa;
      --text-muted: #a1a1aa;
      --accent: #e4e4e7;
      --error: #ef4444;
      --focus: #3b82f6;
      --radius: 12px;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: "Inter", -apple-system, BlinkMacSystemFont, sans-serif;
      background: var(--bg);
      color: var(--text);
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      min-height: 100dvh;
      padding: 1rem;
      -webkit-font-smoothing: antialiased;
    }

    .login {
      width: 100%;
      max-width: 380px;
    }

    .brand {
      display: flex;
      flex-direction: column;
      align-items: center;
      margin-bottom: 2.5rem;
    }

    .brand img {
      width: 72px;
      height: auto;
      margin-bottom: 1rem;
      opacity: 0.9;
    }

    .brand h1 {
      font-size: 1.25rem;
      font-weight: 600;
      letter-spacing: 0.02em;
      color: var(--text);
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 2rem;
    }

    .error {
      color: var(--error);
      font-size: 0.8125rem;
      text-align: center;
      margin-bottom: 1rem;
      min-height: 1.125rem;
      font-weight: 500;
    }

    .field {
      margin-bottom: 1.25rem;
    }

    label {
      display: block;
      font-size: 0.8125rem;
      font-weight: 500;
      color: var(--text-muted);
      margin-bottom: 0.5rem;
    }

    input {
      width: 100%;
      padding: 0.625rem 0.75rem;
      font-size: 0.875rem;
      font-family: inherit;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      outline: none;
      transition: border-color 0.15s;
    }

    input:focus {
      border-color: var(--focus);
    }

    input::placeholder {
      color: #52525b;
    }

    button {
      width: 100%;
      padding: 0.625rem;
      font-size: 0.875rem;
      font-family: inherit;
      font-weight: 600;
      background: var(--text);
      color: var(--bg);
      border: none;
      border-radius: 8px;
      cursor: pointer;
      transition: opacity 0.15s;
      margin-top: 0.25rem;
    }

    button:hover {
      opacity: 0.85;
    }

    button:active {
      opacity: 0.7;
    }

    @media screen and (max-width: 480px) {
      .card {
        padding: 1.5rem;
      }

      .brand img {
        width: 56px;
      }
    }
  </style>
</head>
<body>
  <div class="login">
    <div class="brand">
      <img src="/hussain.png" alt="">
      <h1>Ashara 1448 Relay</h1>
    </div>
    <div class="card">
      <div class="error">{{ERROR_MESSAGE}}</div>
      <form method="POST" action="/login">
        <div class="field">
          <label for="username">Username</label>
          <input type="text" id="username" name="username" placeholder="Enter username" autocomplete="username" required>
        </div>
        <div class="field">
          <label for="password">Password</label>
          <input type="password" id="password" name="password" placeholder="Enter password" autocomplete="current-password" required>
        </div>
        <button type="submit">Sign in</button>
      </form>
    </div>
  </div>
</body>
</html>
